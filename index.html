<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Clinica Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #333; }
    .evento { border-left: 4px solid #007bff; padding: 1rem; margin-bottom: 1.5rem; background: #f8f9fa; border-radius: 0 8px 8px 0; }
    .data { color: #6c757d; font-weight: bold; font-size: 0.9rem; }
    .categoria { display: inline-block; background: #e9ecef; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; margin-left: 10px; text-transform: uppercase; }
    h3 { margin: 0.5rem 0; color: #0056b3; }
    p { margin: 0.5rem 0; line-height: 1.5; }
  </style>
</head>
<body>

  <h1>Cronologia Clinica</h1>
  
  <div id="timeline-container">
    <p><em>Caricamento dati in corso...</em></p>
  </div>

  <script src="./app.js"></script>

</body>
</html>
